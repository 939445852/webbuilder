<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>DevTools</title>
  <style>
    @media (prefers-color-scheme: dark) {
      body {
        background-color: rgb(41 42 45);
      }
    }
  </style>
  <link href="./application_tokens.css" rel="stylesheet">
  <link href="./design_system_tokens.css" rel="stylesheet">
  <script type="module" src="./entrypoints/devtools_app/devtools_app.js"></script>
</head>
<body class="undocked" id="-blink-dev-tools">
<script type="module">
  const params = new URLSearchParams(window.location.search);
  const xwl = params.get('xwl');
  let filename = '';
  if (xwl) {
    const parts = xwl.split('/');
    filename = parts[parts.length - 1];
  }
  document.title = filename ? `${filename} - DevTools` : 'DevTools';
</script>
</body>
</html>
